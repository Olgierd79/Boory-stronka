<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover helps on iOS; safe-area is handled in CSS -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Olek Jazdowski</title>

  <!-- Icons (Font Awesome via cdnjs) -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" /> <!-- [3](https://cdnjs.com/libraries/font-awesome) -->

  <style>
    :root{
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --glass: rgba(0,0,0,.28);
      --stroke: rgba(255,255,255,.18);
      --shadow: 0 16px 45px rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);

      /* Full screen background image */
      background:
        linear-gradient(180deg, rgba(0,0,0,.30), rgba(0,0,0,.55)),
        url("photo.jpg") center / cover no-repeat fixed;
    }

    /* Keep layout simple: nothing to scroll unless you add content later */
    .page{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px;
      text-align:center;
    }

    /* Optional: small subtle title (remove if you truly want ONLY links) */
    .hint{
      max-width: 70ch;
      color: var(--muted);
      font-size: clamp(14px, 2.4vw, 16px);
      text-shadow: 0 6px 24px rgba(0,0,0,.55);
      opacity: .0; /* set to 1 if you want text visible */
    }

    /* Bottom social bar */
    .social-bar{
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;

      /* Safe area support for iOS home indicator */
      padding-bottom: calc(12px + env(safe-area-inset-bottom)); /* [1](https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Values/env)[2](https://willcodefor.beer/posts/safely-position-fixed-content-in-mobile-browsers/) */
      padding-top: 12px;
      padding-left: 12px;
      padding-right: 12px;

      display:flex;
      justify-content:center;
      pointer-events:none; /* only buttons receive clicks */
    }

    .social{
      pointer-events:auto;
      display:flex;
      gap: 10px;
      align-items:center;

      border: 1px solid var(--stroke);
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--shadow);

      border-radius: 999px;
      padding: 10px 12px;
    }

    .social a{
      display:inline-flex;
      align-items:center;
      gap: 10px;

      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);

      color: var(--text);
      text-decoration:none;
      font-weight: 600;
      letter-spacing: .2px;

      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .social a i{
      font-size: 18px;
      width: 18px;
      text-align:center;
    }

    .social a:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.10);
      border-color: rgba(255,255,255,.22);
    }

    .social a:active{
      transform: translateY(0px);
    }

    .social a:focus-visible{
      outline: 3px solid rgba(255,255,255,.55);
      outline-offset: 2px;
    }

    /* Mobile: keep only icons if space is tight */
    @media (max-width: 420px){
      .social a span{ display:none; }
      .social a{ padding: 12px 14px; }
      .social{ gap: 8px; }
    }

    /* Reduced motion accessibility */
    @media (prefers-reduced-motion: reduce){
      .social a{ transition:none; }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="hint"> </div>
  </main>

  <footer class="social-bar" aria-label="Social links">
    <nav class="social" aria-label="Social media">
      <a href="https://www.linkedin.com/in/jazdowski" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
        <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
        <span>LinkedIn</span>
      </a>

      <a href="https://www.facebook.com/jazdowski/" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
        <i class="fa-brands fa-facebook-f" aria-hidden="true"></i>
        <span>Facebook</span>
      </a>

      <a href="https://www.instagram.com/olgierd79/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <i class="fa-brands fa-instagram" aria-hidden="true"></i>
        <span>Instagram</span>
      </a>
    </nav>
  </footer>
</body>
</html>
